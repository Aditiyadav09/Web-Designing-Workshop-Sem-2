<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet pyramid</title>
</head>
<body>
    <script>

console.log("Alphabet Pyramid");

for(let i=0;i<4;i++){

    let row="";
    let ch = String.fromCharCode(65+i);

    for(let j=0;j<=i;j++){
        row+= ch +" ";
    }

    console.log(row);
}

</script>
</body>
</html>
