<!DOCTYPE html>
<html>

<head>
<title>Triangle Pattern</title>
</head>

<body>

<script>

console.log("Triangle Pattern");

for(let i=1;i<=5;i++){

    let row="";

    for(let s=1;s<=5-i;s++){
        row += " ";
    }

    for(let j=1;j<=2*i-1;j++){
        row += "*";
    }

    console.log(row);
}

</script>

</body>
</html>
