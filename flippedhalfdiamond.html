<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipped Half Diamond</title>
</head>

<body>

<script>

console.log("Flipped Half Diamond");


for(let i=1;i<=4;i++){
    let row="";

    for(let k=1;k<=4-i;k++){
        row+="  ";
    }

    for(let j=1;j<=i;j++){
        row+="* ";
    }

    console.log(row);
}


for(let i=3;i>=1;i--){
    let row="";

    for(let k=1;k<=4-i;k++){
        row+="  ";
    }

    for(let j=1;j<=i;j++){
        row+="* ";
    }

    console.log(row);
}

</script>

</body>
</html>
